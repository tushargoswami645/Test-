      // *Find the Missing Number:*
let numbers = [1, 2, 4, 5]; 
function findMissingNumber(arr) {
    let n = arr.length + 1;
    let totalSum = (n * (n + 1)) / 2;

    let arraySum = 0;
    for (let i = 0; i < arr.length; i++) {
        arraySum += arr[i];  
    }

    return totalSum - arraySum;
}

let missingNumber = findMissingNumber(numbers);

console.log("The missing number is:", missingNumber);






    
//**Kth Smallest Element in an Array:** 
    function select(arr, k) {
        if (k>arr.length) {
         console.log("k is big amount");
            
        }
    function myselect(left, right, ksmall) {
    if (left === right) 
    return arr[left];

    let pivot = arr[right];
    let p = left;

    for (let i = left; i < right; i++) {
      if (arr[i] < pivot) [arr[i], arr[p++]] = [arr[p], arr[i]];
    }
    [arr[p], arr[right]] = [arr[right], arr[p]];

    if (ksmall === p) 
    return arr[p];
    return ksmall < p ? myselect(left, p - 1, ksmall) : myselect(p + 1, right, ksmall);
  }

    return myselect(0, arr.length - 1, k - 1);
}
console.log(select([1, 2, 3, 4, 5, 6], 2));  























//**Search in a Rotated Sorted Array:** 
const nums = [4, 5, 6, 7, 0, 1, 2];
const target = 7;

function search(nums, target) {
let left = 0;
let right = nums.length - 1;

while (left <= right) {
 let mid = Math.floor((left + right) / 2);

if (nums[mid] === target) 
return mid;

      if (nums[left] <= nums[mid]) {
      if (nums[left] <= target && target < nums[mid]) {
        right = mid - 1;
      } else {
        left = mid + 1;
      }
    } 
    
    else {
      if (nums[mid] < target && target <= nums[right]) {
        left = mid + 1;
      } else {
        right = mid - 1;
      }
    }
  }

  return ["not in array"]; 
}
console.log(search(nums, target)); 



















 //**Reverse a Linked List in Groups of K:** 
class ListNode {
  constructor(val) {
    this.val = val;
    this.next = null;
  }
}

function reverseKGroup(head, k) {
  let count = 0;
  let current = head;

 
  while (current && count < k) {
    current = current.next;
    count++;
  }

  if (count === k) {
    // Reverse k nodes
    let prev = null;
    let curr = head;
    let next = null;
    let i = 0;

    while (i < k && curr) {
      next = curr.next;
      curr.next = prev;
      prev = curr;
      curr = next;
      i++;
    }

    // Recursively reverse the next group
    if (next) {
      head.next = reverseKGroup(next, k);
    }

    return prev;
  }

  return head; // If less than k nodes, return as is
}

// Helper: Create linked list from array
function createLinkedList(arr) {
  if (!arr.length) return null;
  let head = new ListNode(arr[0]);
  let current = head;
  for (let i = 1; i < arr.length; i++) {
    current.next = new ListNode(arr[i]);
    current = current.next;
  }
  return head;
}

// Helper: Print linked list
function printLinkedList(head) {
  let result = [];
  while (head) {
    result.push(head.val);
    head = head.next;
  }
  console.log(result.join(" -> "));
}

let arr = [1, 2, 3, 4,];
let k = 2;
let head = createLinkedList(arr);
let newHead = reverseKGroup(head, k);
printLinkedList(newHead);  













//**Lowest Common Ancestor (LCA) of a Binary Tree:** 
 class TreeNode {
  constructor(val, left = null, right = null) {
    this.val = val;
    this.left = left;
    this.right = right;
  }
}

function lowest(root, p, q) {
  if (!root || root === p || root === q) {
    return root;
  }

  const left = lowest(root.left, p, q);
  const right = lowest(root.right, p, q);

  if (left && right) {
    return root; 
  }

  return left ? left : right;
}



const root = new TreeNode(3);
const node5 = new TreeNode(5);
